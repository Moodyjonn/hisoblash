<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hisoblash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rubik:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222222;
    --border: #2e2e2e;
    --accent: #c8f25a;
    --accent-dim: #9bbe3a;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff5e5e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rubik', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .wrapper {
    width: 100%;
    max-width: 380px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }

  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 12px;
    color: var(--muted);
  }

  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .input-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 10px;
  }

  input[type="number"] {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"]:focus {
    border-color: var(--accent);
  }

  input[type="number"]::placeholder {
    color: #444;
    font-size: 16px;
  }

  .btn {
    background: var(--accent);
    color: #0f0f0f;
    border: none;
    border-radius: 10px;
    font-family: 'Rubik', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--accent-dim); }
  .btn:active { transform: scale(0.97); }

  .btn-clear {
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Rubik', sans-serif;
    font-size: 13px;
    padding: 10px;
    cursor: pointer;
    margin-top: 10px;
    transition: color 0.2s, border-color 0.2s;
  }

  .btn-clear:hover { color: var(--danger); border-color: var(--danger); }

  .steps {
    display: none;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .steps.show { display: flex; }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    animation: fadeUp 0.3s ease both;
  }

  .step:nth-child(1) { animation-delay: 0.05s; }
  .step:nth-child(2) { animation-delay: 0.1s; }
  .step:nth-child(3) { animation-delay: 0.15s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .step-left { flex: 1; }

  .step-name {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .step-formula {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #555;
  }

  .step-val {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--text);
    font-weight: 700;
  }

  .result-card {
    display: none;
    background: var(--accent);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
    animation: fadeUp 0.3s ease 0.2s both;
  }

  .result-card.show { display: block; }

  .result-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #3a4a10;
    margin-bottom: 8px;
  }

  .result-num {
    font-family: 'Space Mono', monospace;
    font-size: 42px;
    font-weight: 700;
    color: #0f0f0f;
    line-height: 1;
  }

  .history-section {
    margin-top: 24px;
  }

  .history-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .history-item:hover { border-color: var(--accent); }

  .history-in { color: var(--muted); font-family: 'Space Mono', monospace; }
  .history-out { color: var(--accent); font-family: 'Space Mono', monospace; font-weight: 700; }

  .no-history {
    font-size: 12px;
    color: #444;
    text-align: center;
    padding: 12px;
  }

  .offline-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #1e2a0a;
    border: 1px solid #3a5010;
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <h1>Hisoblash</h1>
    <p>Sondan 200 ayirib, 30% qo'shib, qaytaradi</p>
    <div class="offline-badge">
      <div class="dot"></div>
      Internetsiz ishlaydi
    </div>
  </div>

  <div class="input-section">
    <span class="input-label">Sonni kiriting</span>
    <div class="input-row">
      <input type="number" id="inp" placeholder="0" oninput="hisobla()" onkeydown="if(event.key==='Enter')hisobla()" />
      <button class="btn" onclick="hisobla()">Hisobla</button>
    </div>
    <button class="btn-clear" onclick="tozala()">Tozalash</button>
  </div>

  <div class="steps" id="steps">
    <div class="step">
      <div class="step-left">
        <div class="step-name">200 ayirildi</div>
        <div class="step-formula" id="f1"></div>
      </div>
      <div class="step-val" id="s1"></div>
    </div>
    <div class="step">
      <div class="step-left">
        <div class="step-name">30% qo'shildi</div>
        <div class="step-formula" id="f2"></div>
      </div>
      <div class="step-val" id="s2"></div>
    </div>
    <div class="step">
      <div class="step-left">
        <div class="step-name">200 qaytarildi</div>
        <div class="step-formula" id="f3"></div>
      </div>
      <div class="step-val" id="s3"></div>
    </div>
  </div>

  <div class="result-card" id="result">
    <div class="result-label">Natija</div>
    <div class="result-num" id="rnum"></div>
  </div>

  <div class="history-section" id="histSec" style="display:none">
    <div class="history-title">Oxirgi hisoblashlar</div>
    <div class="history-list" id="histList"></div>
  </div>

</div>

<script>
  let history = JSON.parse(localStorage.getItem('calc_history') || '[]');

  function fmt(n) {
    return parseFloat(n.toFixed(2)).toLocaleString('uz-UZ', {maximumFractionDigits: 2});
  }

  function hisobla() {
    const val = parseFloat(document.getElementById('inp').value);
    if (isNaN(val)) {
      document.getElementById('steps').classList.remove('show');
      document.getElementById('result').classList.remove('show');
      return;
    }
    const s1 = val - 200;
    const added = s1 * 0.3;
    const s2 = s1 + added;
    const s3 = s2 + 200;

    document.getElementById('f1').textContent = fmt(val) + ' − 200';
    document.getElementById('s1').textContent = fmt(s1);
    document.getElementById('f2').textContent = fmt(s1) + ' + ' + fmt(added);
    document.getElementById('s2').textContent = fmt(s2);
    document.getElementById('f3').textContent = fmt(s2) + ' + 200';
    document.getElementById('s3').textContent = fmt(s3);
    document.getElementById('rnum').textContent = fmt(s3);

    document.getElementById('steps').classList.add('show');
    document.getElementById('result').classList.add('show');

    saveHistory(val, s3);
  }

  function saveHistory(input, output) {
    history.unshift({input, output, time: Date.now()});
    if (history.length > 10) history = history.slice(0, 10);
    localStorage.setItem('calc_history', JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      document.getElementById('histSec').style.display = 'none';
      return;
    }
    document.getElementById('histSec').style.display = 'block';
    const list = document.getElementById('histList');
    list.innerHTML = history.map((h, i) =>
      `<div class="history-item" onclick="loadHistory(${i})">
        <span class="history-in">${fmt(h.input)}</span>
        <span style="color:#444; font-size:12px;">→</span>
        <span class="history-out">${fmt(h.output)}</span>
      </div>`
    ).join('');
  }

  function loadHistory(i) {
    document.getElementById('inp').value = history[i].input;
    hisobla();
  }

  function tozala() {
    document.getElementById('inp').value = '';
    document.getElementById('steps').classList.remove('show');
    document.getElementById('result').classList.remove('show');
  }

  renderHistory();
</script>
</body>
</html>

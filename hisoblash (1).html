<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hisoblash</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #fff;
    font-family: sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .box {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  input[type="number"] {
    width: 100%;
    background: #1e1e1e;
    border: 2px solid #333;
    border-radius: 14px;
    color: #fff;
    font-size: 32px;
    padding: 20px;
    outline: none;
    text-align: center;
    -moz-appearance: textfield;
  }
  input::-webkit-inner-spin-button,
  input::-webkit-outer-spin-button { -webkit-appearance: none; }
  input:focus { border-color: #c8f25a; }

  button {
    width: 100%;
    background: #c8f25a;
    color: #111;
    border: none;
    border-radius: 14px;
    font-size: 18px;
    font-weight: 700;
    padding: 18px;
    cursor: pointer;
  }
  button:active { opacity: 0.85; }

  .natija {
    background: #1e1e1e;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    display: none;
  }
  .natija.show { display: block; }
  .natija-label { font-size: 12px; color: #666; margin-bottom: 8px; letter-spacing: 0.1em; text-transform: uppercase; }
  .natija-son { font-size: 40px; font-weight: 700; color: #c8f25a; }
</style>
</head>
<body>
<div class="box">
  <input type="number" id="inp" placeholder="Son kiriting" onkeydown="if(event.key==='Enter')hisob()" />
  <button onclick="hisob()">Hisobla</button>
  <div class="natija" id="natija">
    <div class="natija-label">Natija</div>
    <div class="natija-son" id="son"></div>
  </div>
</div>

<script>
function hisob() {
  const x = parseFloat(document.getElementById('inp').value);
  if (isNaN(x)) return;

  const v1 = x + x * 0.03;       // +3%
  const v2 = v1 - 200;            // -200
  const v3 = v2 + v2 * 0.30;     // +30%
  const v4 = v3 + 200;            // +200

  const natija = document.getElementById('natija');
  document.getElementById('son').textContent = parseFloat(v4.toFixed(2)).toLocaleString();
  natija.classList.add('show');
}
</script>
</body>
</html>
